AWSTemplateFormatVersion: "2010-09-09"
Description: Stack Alumno B - Infraestructura Base (Sin Peering Automatizado)

Parameters:
  MyPublicIp: { Type: String }
  KeyPairName: { Type: String }
  AmiId: { Type: String, Default: "ami-073422177b6b3ed22" }
  BackupBucketName: { Type: String, Default: "ufv-postgres-backups" }

  # Mantenemos los parámetros para que Jenkins no falle al intentar pasarlos,
  # aunque ya no los usemos en la lógica.
  Peer1VpcId: { Type: String, Default: "" }
  Peer1AccountId: { Type: String, Default: "" }
  Peer1Cidr: { Type: String, Default: "10.1.0.0/16" }

  Peer2VpcId: { Type: String, Default: "" }
  Peer2AccountId: { Type: String, Default: "" }
  Peer2Cidr: { Type: String, Default: "10.2.0.0/16" }

  Peer3VpcId: { Type: String, Default: "" }
  Peer3AccountId: { Type: String, Default: "" }
  Peer3Cidr: { Type: String, Default: "10.3.0.0/16" }

  Peer4VpcId: { Type: String, Default: "" }
  Peer4AccountId: { Type: String, Default: "" }
  Peer4Cidr: { Type: String, Default: "10.4.0.0/16" }

Resources:
  # ==========================================
  # 1. INFRAESTRUCTURA DE RED BASE
  # ==========================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.8.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{ Key: Name, Value: vpc-personal-B }]

  InternetGateway: { Type: AWS::EC2::InternetGateway }

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: { VpcId: !Ref VPC, InternetGatewayId: !Ref InternetGateway }

  SubnetPublic:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.8.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{ Key: Name, Value: subnet-personal-B }]

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref VPC, Tags: [{ Key: Name, Value: rt-personal-B }] }

  RouteInternet:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref SubnetPublic, RouteTableId: !Ref RouteTable }

  # ==========================================
  # 2. SEGURIDAD E INSTANCIAS EC2
  # ==========================================
  SGLinux:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SG Linux Alumno B
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - { IpProtocol: -1, CidrIp: !Ref MyPublicIp }
        - { IpProtocol: -1, CidrIp: 10.1.0.0/16 }
        - { IpProtocol: -1, CidrIp: 10.2.0.0/16 }
        - { IpProtocol: -1, CidrIp: 10.3.0.0/16 }
        - { IpProtocol: -1, CidrIp: 10.4.0.0/16 }
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
      SecurityGroupEgress: [{ IpProtocol: -1, CidrIp: 0.0.0.0/0 }]

  PostgresBackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          [
            {
              Effect: Allow,
              Principal: { Service: ec2.amazonaws.com },
              Action: "sts:AssumeRole",
            },
          ]
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement: [{ Effect: Allow, Action: "s3:*", Resource: "*" }]

  PostgresInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties: { Roles: [!Ref PostgresBackupRole] }

  EC2Postgres:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetPublic
      PrivateIpAddress: 10.8.1.10
      IamInstanceProfile: !Ref PostgresInstanceProfile
      SecurityGroupIds: [!Ref SGLinux]
      Tags: [{ Key: Name, Value: ec2-postgres-personal }]
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # 1. Instalación base
          dnf update -y
          dnf install -y postgresql15-server
          postgresql-setup --initdb

          # 2. Configuración de red del motor
          echo "listen_addresses = '*'" >> /var/lib/pgsql/data/postgresql.conf
          echo "host all all 10.0.0.0/8 md5" >> /var/lib/pgsql/data/pg_hba.conf
          systemctl enable --now postgresql

          # 3. Pausa de seguridad para dejar que el motor arranque completamente
          sleep 5

          # 4. INICIALIZACIÓN DE LA BASE DE DATOS Y USUARIO
          sudo -u postgres psql -c "CREATE DATABASE academico;"
          sudo -u postgres psql -c "CREATE USER backend WITH ENCRYPTED PASSWORD 'ContraseñaSegura123';"

          # 5. CREACIÓN DEL ESQUEMA Y TABLAS (Orden estricto por dependencias FK)
          sudo -u postgres psql -d academico -c "CREATE SCHEMA IF NOT EXISTS academico AUTHORIZATION backend;"

          # 5.1 Tablas Base (Sin dependencias)
          sudo -u postgres psql -d academico -c "
            CREATE TABLE IF NOT EXISTS academico.asignaturas (
              id SERIAL PRIMARY KEY,
              nombre VARCHAR(200) NOT NULL,
              descripcion TEXT,
              creditos INTEGER NOT NULL
            );"
            
          sudo -u postgres psql -d academico -c "
            CREATE TABLE IF NOT EXISTS academico.alumnos (
              id SERIAL PRIMARY KEY,
              nombre VARCHAR(100),
              correo VARCHAR(150) UNIQUE,
              fecha_alta TIMESTAMP
            );"

          # 5.2 Tablas de Primer Nivel de Dependencia
          sudo -u postgres psql -d academico -c "
            CREATE TABLE IF NOT EXISTS academico.inscripciones (
              id SERIAL PRIMARY KEY,
              alumno_id INTEGER NOT NULL REFERENCES academico.alumnos(id),
              asignatura_id INTEGER NOT NULL REFERENCES academico.asignaturas(id),
              fecha_inscripcion TIMESTAMP,
              estado VARCHAR(30)
            );"
            
          sudo -u postgres psql -d academico -c "
            CREATE TABLE IF NOT EXISTS academico.practicas (
              id SERIAL PRIMARY KEY,
              asignatura_id INTEGER NOT NULL REFERENCES academico.asignaturas(id),
              titulo TEXT NOT NULL,
              descripcion TEXT,
              fecha_limite TIMESTAMP NOT NULL
            );"

          # 5.3 Tablas de Segundo Nivel de Dependencia
          sudo -u postgres psql -d academico -c "
            CREATE TABLE IF NOT EXISTS academico.entregas (
              id SERIAL PRIMARY KEY,
              practica_id INTEGER NOT NULL REFERENCES academico.practicas(id),
              alumno_id INTEGER NOT NULL REFERENCES academico.alumnos(id),
              calificacion NUMERIC,
              comentario TEXT
            );"

          # 6. ASIGNACIÓN DE PERMISOS ESPECÍFICOS PARA EL BACKEND
          sudo -u postgres psql -d academico -c "GRANT USAGE ON SCHEMA academico TO backend;"
          sudo -u postgres psql -d academico -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA academico TO backend;"
          sudo -u postgres psql -d academico -c "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA academico TO backend;"

  EC2NginxPersonal:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      ImageId: !Ref AmiId
      SubnetId: !Ref SubnetPublic
      PrivateIpAddress: 10.8.1.11 # Corregido al rango de la Subnet
      SecurityGroupIds: [!Ref SGLinux]
      Tags: [{ Key: Name, Value: ec2-nginx-personal }]
