---
# =============================================================
# Playbook: update_inventory.yml (Adaptado para Alumno B)
# Refresca el inventario dinamico, hace ping a los hosts
# y genera un reporte con el estado de cada instancia
# =============================================================

- name: Verificar conectividad Linux Personal (Alumno B)
  hosts: linux_personal
  gather_facts: yes
  ignore_unreachable: yes
  tasks:
    - name: Ping
      ansible.builtin.ping:
      register: ping_result

    - name: Recoger info del sistema
      ansible.builtin.setup:
        gather_subset:
          - network
          - hardware
      when: ping_result is succeeded

- name: Generar reporte de inventario
  hosts: localhost
  gather_facts: no
  tasks:
    - name: Mostrar inventario completo
      ansible.builtin.debug:
        msg: |
          ============================================================
           INVENTARIO AWS - {{ lookup('pipe', 'date') }}
          ============================================================

          --- Alumno B (10.8.0.0/16) ---
          {% for host in groups['linux_personal'] | default([]) %}
            [Linux] {{ hostvars[host]['instance_name'] | default('N/A') }}
                    IP: {{ host }}
                    Estado: {{ 'ACCESIBLE' if hostvars[host].get('ansible_hostname') else 'NO ACCESIBLE' }}
                    OS: {{ hostvars[host].get('ansible_distribution', 'N/A') }} {{ hostvars[host].get('ansible_distribution_version', '') }}
          {% endfor %}

          --- Grupos funcionales ---
            nginx    : {{ groups['nginx'] | default([]) | join(', ') }}
            postgres : {{ groups['postgres'] | default([]) | join(', ') }}
          ============================================================

    - name: Guardar inventario en fichero
      ansible.builtin.copy:
        content: |
          # Inventario generado: {{ lookup('pipe', 'date') }}

          [linux_personal]
          {% for host in groups['linux_personal'] | default([]) %}
          {{ host }}  # {{ hostvars[host]['instance_name'] | default('') }}
          {% endfor %}

          [nginx]
          {% for host in groups['nginx'] | default([]) %}
          {{ host }}
          {% endfor %}

          [postgres]
          {% for host in groups['postgres'] | default([]) %}
          {{ host }}
          {% endfor %}
        dest: /usr/local/ufv/ufv-infra/ansible/inventory/current_inventory.ini
      delegate_to: localhost
