# /usr/local/ufv/ufv-infra/ufv-app/nginx/AlexPersonal_nginx.conf
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # ========================================================
    # UPSTREAMS (Backend Web Servers)
    # ========================================================
    
    # Upstream: Módulo Profesores (Alumno E)
    upstream profesores_backend {
        server 10.7.1.20:3001;
        server 10.7.1.21:3001;
    }

    # Upstream: Módulo Alumnos (Alumno D)
    upstream alumnos_backend {
        server 10.3.1.10:80 max_fails=3 fail_timeout=10s;
        server 10.3.1.11:80 max_fails=3 fail_timeout=10s;
    }

    # Upstream: Módulo Prácticas
    upstream practicas_backend {
        server 10.1.1.10:80;
        server 10.1.1.11:80;
    }

    server {
        listen       80;
        server_name  localhost;

        # ========================================================
        # LOCATIONS (Rutas de la aplicación)
        # ========================================================

        # 1. Contenido estático (Frontend general)
        location / {
            root   /var/www/public;
            index  index.html index.htm;
            try_files $uri $uri/ =404;
        }

        # 2. Enrutamiento al Módulo de Profesores
        location /profesores/ {
            proxy_pass http://profesores_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Enrutamiento al Módulo de Alumnos
        location /alumnos/ {
            proxy_pass http://alumnos_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. Enrutamiento al Módulo de Prácticas
        location /practicas/ {
            proxy_pass http://practicas_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Páginas de error
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
